# KET-RAG 优化配置
# 成员A和成员B共同遵守的配置

# ============ 核心块选择配置 ============
core_selector:
  method: 'pagerank'  # 'random' 或 'pagerank' 或 'importance'
  ratio: 0.2  # 核心块占比（0.1-0.5）
  
  # PageRank方法参数
  pagerank:
    similarity_threshold: 0.5  # 相似度阈值
    embedding_model: 'sentence-transformers/all-MiniLM-L6-v2'
  
  # 重要性方法参数（可选）
  importance:
    position_weight: 0.3  # 位置权重
    entity_weight: 0.4    # 实体密度权重
    keyword_weight: 0.3   # 关键词权重

# ============ 二部图配置（成员B主要使用）============
bipartite_graph:
  # 关键词提取参数
  top_k_keywords: 10  # 每个文本提取的关键词数量
  min_keyword_length: 2  # 最小关键词长度
  
  # 各方法权重（总和应为1.0）
  tfidf_weight: 0.4      # TF-IDF方法权重
  textrank_weight: 0.4   # TextRank方法权重
  ner_weight: 0.2        # NER方法权重
  
  # TF-IDF参数
  tfidf:
    max_features: 1000   # 词汇表大小
    ngram_range: [1, 2]  # n-gram范围
    min_df: 2            # 最小文档频率
    max_df: 0.8          # 最大文档频率
  
  # TextRank参数
  textrank:
    window: 5            # 窗口大小
    
  # NER参数（可选）
  ner:
    use_ner: true        # 是否使用NER
    model: 'spacy'       # NER模型 ('spacy' 或其他)

# ============ 骨架图配置（成员A主要使用）============
skeleton_graph:
  # LLM配置
  llm:
    model: 'gpt-3.5-turbo'  # 使用的模型
    temperature: 0.0        # 温度参数
    max_tokens: 1000        # 最大token数
  
  # 实体提取prompt
  entity_extraction_prompt: |
    从以下文本中提取实体和关系。
    
    文本: {text}
    
    请以JSON格式返回:
    {
      "entities": [{"name": "实体名", "type": "实体类型", "description": "描述"}],
      "relations": [{"source": "源实体", "target": "目标实体", "type": "关系类型"}]
    }
  
  # 社区检测
  community:
    algorithm: 'leiden'  # 社区检测算法
    resolution: 1.0      # 分辨率参数

# ============ 混合检索配置（成员A主要使用）============
hybrid_retriever:
  skeleton_weight: 0.6    # 骨架图权重
  bipartite_weight: 0.4   # 二部图权重
  top_k: 10               # 返回结果数量
  
  # 结果融合策略
  fusion_method: 'weighted_sum'  # 'weighted_sum' 或 'rrf' (reciprocal rank fusion)

# ============ 数据处理配置 ============
data:
  # 文本分块
  chunk:
    size: 512            # 块大小（字符数）
    overlap: 50          # 重叠字符数
    
  # 数据集路径
  paths:
    raw: 'data/raw/'
    processed: 'data/processed/'
    results: 'results/'
    
  # 测试数据
  test:
    num_queries: 100     # 测试查询数量
    test_split: 0.2      # 测试集比例

# ============ 评估配置 ============
evaluation:
  metrics:
    - 'recall@10'
    - 'precision@10'
    - 'f1@10'
    - 'mrr'  # Mean Reciprocal Rank
    
  # 成本统计
  cost_tracking:
    track_tokens: true
    track_time: true
    track_api_calls: true

# ============ 实验配置 ============
experiments:
  # 对比实验
  comparison:
    baseline_name: 'Baseline GraphRAG'
    optimized_name: 'KET-RAG'
    
  # 成本对比
  cost_comparison:
    enabled: true
    
  # 质量对比
  quality_comparison:
    enabled: true
    datasets: ['hotpotqa', 'nq']  # 使用的数据集
    
  # 参数敏感性（成员B的实验）
  parameter_sensitivity:
    enabled: true
    test_ratios: [0.1, 0.2, 0.3, 0.5]  # 测试不同的core_ratio

# ============ 可视化配置 ============
visualization:
  style: 'seaborn'       # matplotlib样式
  dpi: 300               # 图片分辨率
  figsize: [10, 6]       # 图片大小
  
  # 保存路径
  save_path: 'results/figures/'

# ============ 日志配置 ============
logging:
  level: 'INFO'          # DEBUG, INFO, WARNING, ERROR
  file: 'logs/ketrag.log'
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'

# ============ 其他配置 ============
misc:
  random_seed: 42        # 随机种子
  n_jobs: 4              # 并行任务数（-1表示使用所有CPU）
  cache_enabled: true    # 是否启用缓存
