models:
  default_chat_model:
    type: chat
    model: deepseek-v4-flash
    model_provider: deepseek
    auth_type: api_key
    api_key: null
    api_base: https://api.deepseek.com
    max_retries: 3
    max_retry_wait: 5.0
    temperature: 0.0
    max_tokens: 2000
    model_supports_json: true
    prompt_token_cost_per_1k: null
    completion_token_cost_per_1k: null
  default_embedding_model:
    type: embedding
    model: text-embedding-3-small

extraction:
  extractor_provider: llm
  llm_provider: deepseek
  llm_model_id: default_chat_model
  max_retries: 2
  max_gleanings: 1
  fail_on_invalid_chunk: true
  default_confidence: 0.7
  requests_per_minute: 60
  concurrent_requests: 1
  max_prompt_tokens_per_chunk: 8000
  max_total_tokens: null
  max_estimated_cost: null
  salvage_on_parse_failure: true

fusion:
  relation_schema_mode: open

graph_store:
  provider: neo4j
  uri: bolt://127.0.0.1:7690
  username: neo4j
  password_env: NEO4J_PASSWORD
  database: neo4j
  fallback: json
  batch_size: 500
  replace_index_on_write: true
  connection_timeout_seconds: 10.0
  transaction_timeout_seconds: 30.0
  max_transaction_retries: 2
  transaction_retry_backoff_seconds: 0.5

community:
  enabled: true
  algorithm: louvain
  min_community_size: 2
  generate_reports: true
  reporter: mock
