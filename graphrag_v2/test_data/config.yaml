root_dir: "."

# 输入配置
input:
  type: "file"
  base_dir: "./test_data"
  file_pattern: "*.txt"
  encoding: "utf-8"

# 输出配置
output:
  type: "file"
  base_dir: "./test_output"

# 缓存配置
cache:
  type: "file"
  base_dir: "./test_output/cache"

# 分块配置
chunks:
  size: 300
  overlap: 100
  group_by_columns: ["id"]

# 语言模型配置
models:
  default_chat_model:
    type: "chat"
    model: "glm-4-flash"
    max_tokens: 4000
    temperature: 0.7

  default_embedding_model:
    type: "embedding"
    model: "embedding-3"
    max_tokens: 8191

# 实体提取配置
entity_extraction:
  enabled: true
  max_gleanings: 1
  entity_types:
    - "人物"
    - "组织"
    - "技术"
    - "产品"
    - "概念"
  model_id: "default_chat_model"

# 社区报告配置
community_reports:
  max_length: 1000
  max_input_length: 4000
  model_id: "default_chat_model"

# 全局搜索配置
global_search:
  max_tokens: 8000
  data_max_tokens: 8000
  map_max_tokens: 500
  reduce_max_tokens: 1000
  concurrency: 4
  model_id: "default_chat_model"

# 局部搜索配置
local_search:
  max_tokens: 8000
  text_unit_prop: 0.5
  community_prop: 0.1
  top_k_entities: 10
  top_k_relationships: 10
  model_id: "default_chat_model"

