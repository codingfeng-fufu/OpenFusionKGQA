name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
    inputs:
      run_neo4j:
        description: "Run optional Neo4j integration tests"
        required: false
        type: boolean
        default: false
      run_real_llm:
        description: "Run optional real DeepSeek + Neo4j smoke test"
        required: false
        type: boolean
        default: false
      run_docker:
        description: "Build the local CLI Docker image"
        required: false
        type: boolean
        default: false

jobs:
  test:
    name: Python 3.11 tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest graphrag_v2/tests -q

  neo4j:
    name: Optional Neo4j integration tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_neo4j

    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/kgqa-local-password
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p kgqa-local-password 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

    env:
      NEO4J_URI: bolt://127.0.0.1:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: kgqa-local-password
      NEO4J_DATABASE: neo4j

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Neo4j integration tests
        run: |
          python -m pytest graphrag_v2/tests/integration/test_neo4j_store.py \
            graphrag_v2/tests/integration/test_community_pipeline.py -q

  real-llm-smoke:
    name: Optional real DeepSeek smoke test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_real_llm

    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/kgqa-local-password
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p kgqa-local-password 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

    env:
      KGQA_REAL_LLM_SMOKE: "1"
      KGQA_REAL_LLM_CONFIG: settings.local.real-llm.yaml
      NEO4J_URI: bolt://127.0.0.1:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: kgqa-local-password
      NEO4J_DATABASE: neo4j

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Write real DeepSeek config
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          test -n "$DEEPSEEK_API_KEY"
          python - <<'PY'
          import os
          from pathlib import Path

          import yaml

          config_path = Path(os.environ["KGQA_REAL_LLM_CONFIG"])
          config = {
              "models": {
                  "default_chat_model": {
                      "type": "chat",
                      "model": "deepseek-v4-flash",
                      "model_provider": "deepseek",
                      "auth_type": "api_key",
                      "api_base": "https://api.deepseek.com",
                      "api_key": os.environ["DEEPSEEK_API_KEY"],
                      "temperature": 0.0,
                      "max_tokens": 2000,
                      "max_retries": 3,
                      "max_retry_wait": 5.0,
                  },
                  "default_embedding_model": {
                      "type": "embedding",
                      "model": "text-embedding-3-small",
                  },
              },
              "extraction": {
                  "extractor_provider": "llm",
                  "llm_provider": "deepseek",
                  "llm_model_id": "default_chat_model",
              },
          }
          config_path.write_text(
              yaml.safe_dump(config, sort_keys=False),
              encoding="utf-8",
          )
          PY

      - name: Run real DeepSeek smoke test
        run: python -m pytest graphrag_v2/tests/integration/test_real_llm_smoke.py -q

  docker-build:
    name: Optional Docker build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_docker

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build CLI image
        run: docker build -t openfusion-kgqa:ci .

      - name: Verify CLI image
        run: docker run --rm openfusion-kgqa:ci --help
